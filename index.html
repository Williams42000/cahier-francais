<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon cahier de français</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap');
:root{--wine:#4a1e3a;--lav:#b7b6d6;--lav-soft:#cfcee6;--pink:#e85fa0;--pink-soft:#f49ac2;--magenta:#d6228a;--green:#3fa64a;--blue:#2d5bd6;--red:#e23b3b;--paper:#fbfbef;--ink:#33263a;--line:rgba(74,30,58,.09);}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:var(--wine);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
:focus-visible{outline:3px solid var(--pink);outline-offset:2px;border-radius:6px}
#app{max-width:920px;margin:0 auto;padding:0 16px 80px}
.paper{background-color:var(--paper);background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:22px 22px;border-radius:20px;box-shadow:0 18px 40px -22px rgba(0,0,0,.6),0 2px 0 rgba(255,255,255,.4) inset}
header{padding:30px 4px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.squiggle{width:52px;height:52px;flex:none}
.brand h1{font-family:'Caveat',cursive;font-weight:700;color:var(--pink-soft);font-size:34px;line-height:1;letter-spacing:.5px}
.brand h1 small{display:block;font-family:'Fredoka';font-weight:500;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--lav);margin-top:2px}
.lang{display:flex;background:rgba(255,255,255,.1);border-radius:999px;padding:4px}
.lang button{color:var(--lav-soft);font-family:'Fredoka';font-weight:600;font-size:13px;padding:6px 14px;border-radius:999px;transition:.2s}
.lang button[aria-pressed="true"]{background:var(--pink);color:#fff}
.hero{padding:30px 28px;margin-bottom:26px;position:relative;overflow:hidden}
.hero h2{font-family:'Fredoka';font-weight:700;font-size:clamp(24px,5vw,34px);color:var(--wine);line-height:1.1}
.hero p{margin-top:8px;max-width:46ch;color:#6a5566;font-size:15.5px}
.hero .pen{font-family:'Caveat';font-size:26px;color:var(--magenta);transform:rotate(-3deg);display:inline-block;margin-top:14px}
.sec-label{display:flex;align-items:center;gap:12px;margin:30px 4px 14px}
.sec-label span{font-family:'Fredoka';font-weight:700;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--lav)}
.sec-label .ln{flex:1;height:2px;background:rgba(183,182,214,.3);border-radius:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:13px}
.card{background:#fff;border-radius:18px;padding:20px;text-align:left;position:relative;border:2px solid transparent;transition:transform .18s,box-shadow .18s,border-color .18s;box-shadow:0 10px 26px -18px rgba(74,30,58,.7);display:flex;flex-direction:column;gap:6px;min-height:170px}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 34px -18px rgba(74,30,58,.75);border-color:var(--pink-soft)}
.card .tag{font-family:'Fredoka';font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--pink)}
.card h3{font-family:'Fredoka';font-weight:600;font-size:20px;color:var(--wine);line-height:1.15}
.card .sub{font-size:13.5px;color:#7d6a7a;flex:1}
.card .meta{display:flex;align-items:center;gap:10px;margin-top:6px}
.ring{flex:none}
.card .done{font-size:13px;font-weight:700;color:#8a7888}
.card .done b{color:var(--green)}
.vcard{background:#fff;border-radius:16px;padding:16px 15px;text-align:left;border:2px solid transparent;transition:.18s;box-shadow:0 8px 20px -16px rgba(74,30,58,.7);display:flex;flex-direction:column;gap:4px;min-height:120px}
.vcard:hover{transform:translateY(-3px);border-color:var(--pink-soft);box-shadow:0 16px 28px -18px rgba(74,30,58,.7)}
.vcard .ic{font-size:26px;line-height:1}
.vcard h4{font-family:'Fredoka';font-weight:600;font-size:15.5px;color:var(--wine);line-height:1.2;flex:1}
.vcard .n{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#9a8896}
.vcard .n b{color:var(--green)}
.dot{width:8px;height:8px;border-radius:50%;background:#e7e3ee;flex:none}
.dot.on{background:var(--green)}
.back{display:inline-flex;align-items:center;gap:7px;color:var(--lav-soft);font-family:'Fredoka';font-weight:600;font-size:15px;padding:18px 2px 14px;transition:.2s}
.back:hover{color:#fff}
.modhead{padding:24px 26px 8px}
.modhead .tag{font-family:'Fredoka';font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--pink)}
.modhead h2{font-family:'Fredoka';font-weight:700;font-size:clamp(22px,4.5vw,30px);color:var(--wine);margin-top:2px}
.modhead p{color:#6a5566;margin-top:6px;font-size:15px;max-width:60ch}
.tabs{display:flex;gap:8px;padding:14px 26px 0;flex-wrap:wrap}
.tabs button{font-family:'Fredoka';font-weight:600;font-size:15px;color:#9a8896;padding:9px 18px;border-radius:999px 999px 0 0;transition:.2s}
.tabs button[aria-selected="true"]{background:var(--wine);color:#fff}
.panel{padding:22px 26px 30px;border-top:2px solid var(--line)}
.intro-card{background:linear-gradient(180deg,#fff,#fdf4f9);border:2px solid var(--pink-soft);border-radius:16px;padding:20px 22px;margin-bottom:18px;box-shadow:0 8px 20px -16px rgba(74,30,58,.6)}
.intro-card h4{font-family:'Fredoka';font-weight:700;color:var(--magenta);font-size:15px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.intro-card .body{color:var(--ink);font-size:15.5px;line-height:1.6}
.intro-card .body b{color:var(--wine)} .intro-card .body i{color:#7d6a7a}
.note-card{background:#fff;border-radius:16px;padding:20px 22px;box-shadow:0 8px 20px -16px rgba(74,30,58,.6);margin-bottom:16px}
.note-card h4{font-family:'Fredoka';font-weight:600;color:var(--wine);font-size:18px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.note-card h4 .gp{font-family:'Caveat';font-size:18px;color:#fff;background:var(--blue);border-radius:999px;padding:1px 11px}
.note-card .hint{font-size:13.5px;color:#7d6a7a;margin-bottom:12px}
table.conj{border-collapse:collapse;font-family:'Caveat';font-size:25px}
table.conj td{padding:3px 6px;white-space:nowrap}
table.conj .pro{color:var(--wine);padding-right:14px}
.stem{color:var(--ink)} .end{color:var(--magenta);font-weight:700} .dbl{color:var(--blue);font-weight:700}
.pron-table{width:100%;border-collapse:collapse;font-size:14px;margin-top:6px;overflow:hidden;border-radius:12px}
.pron-table th{background:var(--wine);color:#fff;font-family:'Fredoka';font-weight:600;font-size:12.5px;padding:9px 8px;text-align:center}
.pron-table td{padding:8px;text-align:center;border-bottom:1px solid var(--line);font-weight:700}
.pron-table tr:nth-child(even) td{background:rgba(183,182,214,.12)}
.pron-table .c1{color:var(--wine)} .pron-table .c2{color:var(--green)} .pron-table .c3{color:var(--magenta)} .pron-table .c4{color:var(--blue)} .pron-table .c5{color:#9b59b6}
.ex{font-family:'Caveat';font-size:22px;color:var(--ink);margin:5px 0;line-height:1.35}
.ex .hl{color:var(--magenta);font-weight:700} .ex .aux{color:var(--blue);font-weight:700} .ex .acc{color:var(--green);font-weight:700} .ex .neg{color:var(--red);font-weight:700;text-decoration:underline}
.wlist{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:14px;overflow:hidden;margin-top:14px}
.wlist .wl-row{display:contents}
.wl-fr,.wl-es{background:#fff;padding:10px 14px;font-size:15px}
.wl-fr{font-weight:700;color:var(--wine)} .wl-es{color:#6a5566}
.wl-head .wl-fr,.wl-head .wl-es{background:var(--wine);color:#fff;font-family:'Fredoka';font-weight:600;font-size:12px;letter-spacing:1px;text-transform:uppercase}
.flash-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.flash{width:100%;max-width:420px;height:230px;perspective:1200px;cursor:pointer}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flash.flip .flash-inner{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px;text-align:center}
.flash-front{background:#fff;border:2px solid var(--pink-soft)}
.flash-front .word{font-family:'Caveat';font-size:40px;color:var(--wine);font-weight:700}
.flash-front .cat{font-family:'Fredoka';font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--pink)}
.flash-back{background:var(--wine);transform:rotateY(180deg);color:#fff}
.flash-back .es{font-family:'Caveat';font-size:36px;color:var(--pink-soft);font-weight:700}
.flash-back .tip{font-size:14px;color:var(--lav-soft);max-width:30ch}
.flip-hint{font-size:13px;color:#9a8896}
.flash-nav{display:flex;align-items:center;gap:14px}
.flash-nav button{width:46px;height:46px;border-radius:50%;background:#fff;color:var(--wine);font-size:20px;box-shadow:0 6px 16px -10px rgba(74,30,58,.7);transition:.2s;font-weight:700}
.flash-nav button:hover{background:var(--pink);color:#fff}
.flash-count{font-family:'Fredoka';font-weight:600;color:#8a7888;min-width:54px;text-align:center}
.start{text-align:center;padding:10px 6px 6px}
.start h3{font-family:'Fredoka';font-weight:700;color:var(--wine);font-size:22px;margin-bottom:4px}
.start p{color:#6a5566;margin-bottom:20px;font-size:15px}
.start .opts3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:480px;margin:0 auto}
.start .opt3{background:#fff;border:2px solid var(--lav-soft);border-radius:16px;padding:18px 10px;transition:.18s}
.start .opt3:hover{border-color:var(--pink);transform:translateY(-3px)}
.start .opt3 .n{font-family:'Caveat';font-size:40px;font-weight:700;color:var(--magenta);line-height:1}
.start .opt3 .l{font-family:'Fredoka';font-weight:600;color:var(--wine);font-size:14px;margin-top:4px}
.quiz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px}
.qbar{flex:1;height:10px;background:rgba(183,182,214,.3);border-radius:999px;overflow:hidden}
.qbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--pink),var(--magenta));border-radius:999px;transition:width .4s;width:0}
.qscore{font-family:'Fredoka';font-weight:700;color:var(--wine);white-space:nowrap}
.qscore b{color:var(--green)}
.q-prompt{font-family:'Fredoka';font-weight:600;font-size:20px;color:var(--wine);line-height:1.3;margin-bottom:4px}
.q-prompt .big{font-family:'Caveat';font-size:30px;color:var(--magenta)}
.q-sub{font-size:14px;color:#7d6a7a;margin-bottom:18px}
.opts{display:grid;gap:10px}
.opt{background:#fff;border:2px solid var(--lav-soft);border-radius:14px;padding:14px 16px;text-align:left;font-size:17px;font-weight:700;color:var(--wine);transition:.15s;display:flex;align-items:center;gap:10px}
.opt:hover:not(:disabled){border-color:var(--pink);transform:translateX(3px)}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--green);background:#eafaef;color:var(--green)}
.opt.wrong{border-color:var(--red);background:#fdeeee;color:var(--red)}
.opt .mark{margin-left:auto;font-size:18px}
.typed{display:flex;gap:10px;flex-wrap:wrap}
.typed input{flex:1;min-width:200px;font-family:'Caveat';font-size:30px;color:var(--wine);background:#fff;border:2px solid var(--lav-soft);border-radius:14px;padding:8px 16px}
.typed input:focus{border-color:var(--pink);outline:none}
.typed input.ok{border-color:var(--green);background:#eafaef}
.typed input.no{border-color:var(--red);background:#fdeeee}
.feedback{margin-top:16px}
.fb-line{font-family:'Fredoka';font-weight:700;font-size:16px;min-height:22px;display:flex;align-items:center;gap:8px}
.fb-line.ok{color:var(--green)} .fb-line.no{color:var(--red)}
.fb-line .corr{font-family:'Caveat';font-size:24px;color:var(--wine);font-weight:700}
.exp{margin-top:10px;background:#fbf4ee;border-left:4px solid var(--pink);border-radius:0 12px 12px 0;padding:12px 16px;font-size:14.5px;color:#5a4654;line-height:1.55}
.exp b{color:var(--wine)} .exp::before{content:"\1F4A1 ";}
.btn{font-family:'Fredoka';font-weight:600;font-size:16px;background:var(--wine);color:#fff;padding:13px 26px;border-radius:14px;transition:.2s;box-shadow:0 10px 24px -14px var(--wine)}
.btn:hover{background:var(--magenta);transform:translateY(-2px)}
.btn.ghost{background:#fff;color:var(--wine);border:2px solid var(--lav-soft);box-shadow:none}
.btn.ghost:hover{border-color:var(--pink);background:#fff}
.qfoot{margin-top:20px;display:flex;justify-content:flex-end;gap:10px;align-items:center}
.result{text-align:center;padding:18px 10px}
.result .big{font-family:'Caveat';font-size:64px;font-weight:700;color:var(--magenta);line-height:1}
.result h3{font-family:'Fredoka';font-weight:700;font-size:24px;color:var(--wine);margin:6px 0 4px}
.result p{color:#6a5566;margin-bottom:18px}
.result .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
@media (max-width:560px){table.conj{font-size:21px}.flash{height:200px}.panel{padding:18px 16px 26px}.modhead{padding:20px 16px 6px}.tabs{padding:12px 16px 0}.hero{padding:24px 18px}.wlist{grid-template-columns:1fr 1fr}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}.flash-inner{transition:none}}
</style>
</head>
<body>
<div id="app"></div>
<script>
window.FR_DATA = {"intro": {"present": "<b>Le pr\u00e9sent de l'indicatif</b> sert \u00e0 parler de ce qui se passe <b>maintenant</b>, d'une <b>habitude</b>, ou d'une <b>v\u00e9rit\u00e9 g\u00e9n\u00e9rale</b>.<br>Ex : <i>Je mange</i> (en ce moment) \u00b7 <i>Je joue au soccer le lundi</i> (habitude) \u00b7 <i>L'eau bout \u00e0 100 \u00b0C</i> (v\u00e9rit\u00e9).<br><br><b>Formation :</b> on enl\u00e8ve la terminaison de l'infinitif (-er, -ir, -re) et on ajoute la terminaison qui correspond au groupe et \u00e0 la personne.", "imperatif": "<b>L'imp\u00e9ratif</b> sert \u00e0 donner un <b>ordre</b>, un <b>conseil</b> ou une <b>instruction</b>.<br>Il n'existe qu'\u00e0 <b>3 personnes</b> : tu, nous, vous \u2014 et on <b>n'\u00e9crit jamais le pronom</b> (Mange ! et non Tu mange !).<br><br><b>Astuce :</b> pour les verbes en -er, le \u00ab tu \u00bb <b>perd son s</b> (tu manges \u2192 Mange !). Au n\u00e9gatif : <i>Ne mange pas !</i>", "negation": "<b>La n\u00e9gation</b> transforme une phrase positive en phrase n\u00e9gative.<br>La structure de base est <b>ne \u2026 pas</b>, plac\u00e9e <b>autour du verbe conjugu\u00e9</b>.<br><br>Devant une voyelle ou un h muet, <b>ne</b> devient <b>n'</b> (Je n'aime pas).<br>Au <b>pass\u00e9 compos\u00e9</b>, la n\u00e9gation entoure l'<b>auxiliaire</b> (Je n'ai pas mang\u00e9).<br>Autres : ne \u2026 <b>plus</b> (ya no), ne \u2026 <b>jamais</b> (nunca), ne \u2026 <b>rien</b> (nada), ne \u2026 <b>personne</b> (nadie).", "pronoms": "<b>Les pronoms</b> remplacent un nom d\u00e9j\u00e0 connu pour <b>\u00e9viter les r\u00e9p\u00e9titions</b>.<br>Leur forme d\u00e9pend de leur <b>fonction</b> dans la phrase :<br>\u2022 <b>sujet</b> (qui fait l'action) \u2014 je, tu, il\u2026<br>\u2022 <b>COD</b> / objet direct (sans pr\u00e9position) \u2014 le, la, les<br>\u2022 <b>COI</b> / objet indirect (avec \u00ab \u00e0 \u00bb) \u2014 lui, leur<br>\u2022 <b>r\u00e9fl\u00e9chi</b> (l'action revient sur le sujet) \u2014 me, te, se\u2026<br>\u2022 <b>disjoint</b> (apr\u00e8s une pr\u00e9position) \u2014 moi, toi, lui, eux\u2026", "passe": "<b>Le pass\u00e9 compos\u00e9</b> exprime une action <b>termin\u00e9e</b>, ponctuelle ou achev\u00e9e dans le <b>pass\u00e9</b>.<br>Ex : <i>Hier, j'ai mang\u00e9 au restaurant.</i><br><br><b>Formation :</b> auxiliaire <b>\u00eatre</b> ou <b>avoir</b> (au pr\u00e9sent) <b>+ participe pass\u00e9</b>.<br>\u2022 La plupart des verbes \u2192 <b>avoir</b> (j'ai parl\u00e9), sans accord.<br>\u2022 Les verbes de mouvement/\u00e9tat (aller, venir, rester\u2026) et <b>tous les pronominaux</b> \u2192 <b>\u00eatre</b>, et le participe <b>s'accorde avec le sujet</b> (elle est all\u00e9e, ils sont all\u00e9s).", "vocab": "<b>Sports & loisirs.</b> Pour parler de tes activit\u00e9s, trois constructions reviennent tout le temps :<br>\u2022 <b>jouer \u00e0</b> + sport ou jeu \u2192 <i>jouer au soccer, aux \u00e9checs</i><br>\u2022 <b>jouer de</b> + instrument de musique \u2192 <i>jouer du piano, de la guitare</i><br>\u2022 <b>faire du / de la / de l'</b> + activit\u00e9 \u2192 <i>faire du ski, de la danse</i><br><br>Le bon choix d\u00e9pend du <b>type</b> d'activit\u00e9 et du <b>genre</b> du mot (le \u2192 du/au ; la \u2192 de la/\u00e0 la)."}, "bank": {"present": [{"type": "type", "pro": "Je", "p": "\u00eatre", "a": "suis", "exp": "\u00ab \u00eatre \u00bb est irr\u00e9gulier \u2014 \u00e0 m\u00e9moriser : suis, es, est, sommes, \u00eates, sont. Ici : je suis.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type": "type", "pro": "Tu", "p": "\u00eatre", "a": "es", "exp": "\u00ab \u00eatre \u00bb est irr\u00e9gulier \u2014 \u00e0 m\u00e9moriser : suis, es, est, sommes, \u00eates, sont. Ici : tu es.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type": "type", "pro": "Il", "p": "\u00eatre", "a": "est", "exp": "\u00ab \u00eatre \u00bb est irr\u00e9gulier \u2014 \u00e0 m\u00e9moriser : suis, es, est, sommes, \u00eates, sont. Ici : il est.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type"  "\u00ab avoir \u00bb est irr\u00e9gulier : ai, as, a, avons, avez, ont. (J'ai, et non \u00ab je ai \u00bb.) Ici : ils ont.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type": "type", "pro": "Je", "p": "aller", "a": "vais", "exp": "\u00ab aller \u00bb est irr\u00e9gulier : vais, vas, va, allons, allez, vont. Ici : je vais.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type": "type", "pro": "Tu", "p": "aller", "a": "vas", "exp": "\u00ab aller \u00bb est irr\u00e9gulier : vais, vas, va, allons, allez, vont. Ici : tu vas.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type": "type", "pro": "Il", "p": "aller", "a": "va", "exp": "\u00ab aller \u00bb est irr\u00e9gulier : vais, vas, va, allons, allez, vont. Ici : il va.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type": "type", "pro": "Nous", "p": "aller", "a": "allons", "exp": "\u00ab aller \u00bb est irr\u00e9gulier : vais, vas, va, allons, allez, vont. Ici : nous allons.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type": "type", "pro": "Vous", "p": "aller", "a": "allez", "exp": "\u00ab aller \u00bb est irr\u00e9gulier : vais, vas, va, allons, allez, vont. Ici : vous allez.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type": "type", "pro": "Ils", "p": "aller", "a": "vont", "exp": "\u00ab aller \u00bb est irr\u00e9gulier : vais, vas, va, allons, allez, vont. Ici : ils vont.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type": "type", "pro": "Je", "p": "faire", "a": "fais", "exp": "\u00ab faire \u00bb est irr\u00e9gulier : fais, fais, fait, faisons, faites, font. Attention : vous faites (pas \u00ab faisez \u00bb). Ici : je fais.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type": "type", "pro": "Il", "p": "faire", "a": "fait", "exp": "\u00ab faire \u00bb est irr\u00e9gulier : fais, fais, fait, faisons, faites, font. Attention : vous faites (pas \u00ab faisez \u00bb). Ici : il fait.", "sub": "pr\u00e9sent \u00b7 irr\u00e9gulier"}, {"type": "type", "pro": "Nous", "p": "faire", " function ring(pct,size){size=size||42;const r=(size-8)/2,c=2*Math.PI*r,off=c*(1-pct);return '<svg class="ring" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#e7e3ee" stroke-width="6"/><circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#e85fa0" stroke-width="6" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 '+size/2+' '+size/2+')"/><text x="50%" y="53%" text-anchor="middle" dominant-baseline="middle" font-family="Fredoka" font-weight="700" font-size="'+(size*0.28)+'" fill="#4a1e3a">'+Math.round(pct*100)+'</text></svg>';}
const squiggle='<svg class="squiggle" viewBox="0 0 100 100" fill="none"><path d="M8 40 C20 10 42 18 40 40 C38 60 12 58 18 78 C24 96 60 90 64 70 C68 52 90 54 92 70" stroke="#b7b6d6" stroke-width="11" stroke-linecap="round"/></svg>';
function header(){return '<header><div class="brand">'+squiggle+'<h1>Français<small>'+T().subtitle+'</small></h1></div><div class="lang" role="group" aria-label="Langue"><button data-lang="fr" aria-pressed="'+(lang==='fr')+'">FR</button><button data-lang="es" aria-pressed="'+(lang==='es')+'">ES</button></div></header>';}
function bindLang(){app.querySelectorAll('[data-lang]').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;saveLang();render();});}
function secLabel(t){return '<div class="sec-label"><span>'+t+'</span><span class="ln"></span></div>';}

function mountFlash(host,cards,catName){if(!host)return;let i=0,flip=false;
 function draw(){const c=cards[i];host.innerHTML='<div class="flash-wrap"><div class="flash '+(flip?'flip':'')+'" id="flash" tabindex="0" role="button" aria-label="'+T().flipHint+'"><div class="flash-inner"><div class="flash-face flash-front"><span class="cat">Français</span><span class="word">'+c.fr+'</span></div><div class="flash-face flash-back"><span class="es">'+c.es+'</span>'+(c.tip?'<span class="tip">'+c.tip+'</span>':'')+'</div></div></div><span class="flip-hint">'+T().flipHint+'</span><div class="flash-nav"><button id="prev" aria-label="Précédent">\u2039</button><span class="flash-count">'+(i+1)+' / '+cards.length+'</span><button id="next" aria-label="Suivant">\u203a</button></div></div>';
  const f=host.querySelector('#flash');const fl=()=>{flip=!flip;f.classList.toggle('flip');};f.onclick=fl;f.onkeydown=e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();fl();}};
  host.querySelector('#prev').onclick=()=>{i=(i-1+cards.length)%cards.length;flip=false;draw();};host.querySelector('#next').onclick=()=>{i=(i+1)%cards.length;flip=false;draw();};}
 draw();}

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function norm(s){return (s||'').toString().trim().toLowerCase().replace(/\s+/g,' ').replace(/[.!]+$/,'');}
function buildVocabQuiz(words){const qs=[];
 words.forEach(w=>{
  let oth=shuffle(words.filter(x=>x!==w));
  let d1=[];for(const o of oth){if(o.es!==w.es&&d1.indexOf(o.es)<0){d1.push(o.es);if(d1.length===2)break;}}
  qs.push({type:'mc',p:(lang==='es'?'¿Qué significa « ':'Que veut dire « ')+w.fr+' » ?',opts:[w.es].concat(d1),a:w.es,sub:'FR \u2192 ES',exp:'« '+w.fr+' » = « '+w.es+' »'+(w.ex?'. Ex : '+w.ex:'.')});
  let d2=[];for(const o of oth){if(o.fr!==w.fr&&d2.indexOf(o.fr)<0){d2.push(o.fr);if(d2.length===2)break;}}
  qs.push({type:'mc',p:'« '+w.es+(lang==='es'?' » en francés ?':' » en français ?'),opts:[w.fr].concat(d2),a:w.fr,sub:'ES \u2192 FR',exp:'« '+w.es+' » = « '+w.fr+' »'+(w.ex?'. Ex : '+w.ex:'.')});
 });return qs;}

function quizStart(panel,full,key){const total=full.length;
 panel.innerHTML='<div class="start"><h3>'+T().pick+'</h3><p>'+total+' '+T().questions+' '+(lang==='es'?'· con explicación':'· avec explication')+'</p><div class="opts3"><button class="opt3" data-n="10"><span class="n">10</span><span class="l">'+T().fast+'</span></button><button class="opt3" data-n="20"><span class="n">20</span><span class="l">'+T().classic+'</span></button><button class="opt3" data-n="'+total+'"><span class="n">'+total+'</span><span class="l">'+T().all+'</span></button></div></div>';
 panel.querySelectorAll('[data-n]').forEach(b=>b.onclick=()=>runQuiz(panel,full,parseInt(b.dataset.n),key));}

function runQuiz(panel,full,n,key){const qs=shuffle(full).slice(0,n);let idx=0,score=0,answered=false;
 function result(){const pct=score/qs.length;const msg=pct>=0.8?T().resultGood:pct>=0.5?T().resultMid:T().resultLow;
  panel.innerHTML='<div class="result"><div class="big">'+score+'/'+qs.length+'</div><h3>'+msg+'</h3><p>'+T().saved+'</p><div class="actions"><button class="btn" id="retry">'+T().again+'</button><button class="btn ghost" id="home">'+T().home+'</button></div></div>';
  panel.querySelector('#retry').onclick=()=>{if(key==='exam')examStart(panel);else quizStart(panel,full,key);};panel.querySelector('#home').onclick=()=>{view={name:'home'};render();};
  progress[key]=progress[key]||{};progress[key].played=true;progress[key].best=Math.max(progress[key].best||0,pct);saveProgress();}
 function draw(){if(idx>=qs.length){result();return;}const q=qs[idx];answered=false;const prog=(idx/qs.length)*100;let body;
  if(q.type==='mc'){body='<div class="opts">'+shuffle(q.opts).map(o=>'<button class="opt" data-o="'+(''+o).replace(/"/g,'&quot;')+'">'+o+'</button>').join('')+'</div>';}
  else{body='<div class="typed"><input id="ans" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="'+(lang==='es'?'escribe aquí…':'écris ici…')+'"></div>';}
  const ph=q.type==='type'?('<span class="big">'+q.pro+'</span> &nbsp;<span style="font-size:18px;color:#7d6a7a">('+q.p+')</span>'):q.p;
  panel.innerHTML='<div class="quiz-head"><div class="qbar"><i style="width:'+prog+'%"></i></div><span class="qscore">'+T().q+' '+(idx+1)+'/'+qs.length+' · <b>'+score+'</b></span></div><div class="q-prompt">'+ph+'</div><div class="q-sub">'+(q.sub||'')+'</div>'+body+'<div class="feedback" id="fb"></div><div class="qfoot" id="foot"></div>';
  const fb=panel.querySelector('#fb');
  function finish(ok){answered=true;let h='<div class="fb-line '+(ok?'ok':'no')+'">'+(ok?(lang==='es'?'¡Correcto! \u2713':'Correct ! \u2713'):((lang==='es'?'Casi… ':'Presque… ')+T().correctWas+' <span class="corr">'+q.a+'</span>'))+'</div><div class="exp"><b>'+T().explain+' :</b> '+q.exp+'</div>';fb.innerHTML=h;if(ok)score++;
   const foot=panel.querySelector('#foot');foot.innerHTML='<button class="btn" id="nx">'+(idx+1>=qs.length?(lang==='es'?'Ver resultado':'Voir le résultat'):T().next)+' \u2192</button>';const nx=foot.querySelector('#nx');nx.onclick=()=>{idx++;draw();};nx.focus();}
  if(q.type==='mc'){panel.querySelectorAll('.opt').forEach(btn=>btn.onclick=()=>{if(answered)return;const ok=norm(btn.dataset.o)===norm(q.a);panel.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(norm(b.dataset.o)===norm(q.a)){b.classList.add('correct');b.insertAdjacentHTML('beforeend','<span class="mark">\u2713</span>');}else if(b===btn){b.classList.add('wrong');b.insertAdjacentHTML('beforeend','<span class="mark">\u2715</span>');}});finish(ok);});}
  else{const inp=panel.querySelector('#ans');inp.focus();const submit=()=>{if(answered)return;const ok=okTyped(inp.value,q);inp.classList.add(ok?'ok':'no');inp.disabled=true;finish(ok);};const foot=panel.querySelector('#foot');foot.innerHTML='<button class="btn ghost" id="chk">'+T().check+'</button>';foot.querySelector('#chk').onclick=submit;inp.onkeydown=e=>{if(e.key==='Enter')submit();};}
 }
 draw();}

function okTyped(val,q){const v=norm(val);if(v===norm(q.a))return true;if(q.alt){for(const x of q.alt){if(norm(x)===v)return true;}}return false;}

function examPool(){const mods=[['present','Le présent'],['imperatif',"L'impératif"],['negation','La négation'],['pronoms','Les pronoms'],['passe','Le passé composé'],['vocab','Jouer / Faire']];let pool=[];mods.forEach(function(m){const arr=FR_DATA.bank[m[0]]||[];arr.forEach(function(q){pool.push(Object.assign({},q,{sub:(m[1]+(q.sub?' · '+q.sub:''))}));});});EXAM_SENTENCES.forEach(function(q){pool.push(q);});return pool;}

function renderExam(){app.innerHTML=header()+'<button class="back" id="back">← '+T().home+'</button><div class="paper"><div class="modhead"><span class="tag">'+(lang==='es'?'Examen':'Examen')+'</span><h2>🎓 '+T().exam+'</h2><p>'+T().examSub+'</p></div><div class="panel" id="panel"></div></div>';app.querySelector('#back').onclick=function(){view={name:'home'};render();};bindLang();examStart(app.querySelector('#panel'));}
function examStart(panel){const full=examPool();const total=full.length;const fast=Math.min(10,total);const mid=Math.min(20,total);const long=Math.min(40,total);panel.innerHTML='<div class="start"><h3>'+T().pick+'</h3><p>'+total+' '+T().examQ+' '+(lang==='es'?'· con explicación':'· avec explication')+'</p><div class="opts3"><button class="opt3" data-n="'+fast+'"><span class="n">'+fast+'</span><span class="l">'+T().examFast+'</span></button><button class="opt3" data-n="'+mid+'"><span class="n">'+mid+'</span><span class="l">'+T().examMid+'</span></button><button class="opt3" data-n="'+long+'"><span class="n">'+long+'</span><span class="l">'+T().examLong+'</span></button></div></div>';panel.querySelectorAll('[data-n]').forEach(function(b){b.onclick=function(){runQuiz(panel,full,parseInt(b.dataset.n),'exam');};});}

const IA_WEBHOOK="https://n8n.srv1585122.hstgr.cloud/webhook/cahier-francais-ia";
function iaCurrentSection(){try{if(view.name==='module'){const m=META.find(x=>x.id===view.id);return m?m.title:'Module';}if(view.name==='cat'){const c=VOCAB_LIB.find(x=>x.id===view.id);return 'Vocabulaire : '+(c?c.fr:'');}if(view.name==='exam')return 'Examen final';return 'Accueil';}catch(e){return 'Accueil';}}
function iaEsc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function iaMd(src){const lines=iaEsc(src).split(/\r?\n/);let out='';let i=0;const isSep=l=>/-/.test(l)&&/^[\s|:\-]+$/.test(l);const cells=l=>l.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());
 while(i<lines.length){if(/\|/.test(lines[i])&&i+1<lines.length&&isSep(lines[i+1])){const head=lines[i];const rows=[];i+=2;while(i<lines.length&&/\|/.test(lines[i])&&lines[i].trim()!==''){rows.push(lines[i]);i++;}out+='<table class="ia-tbl"><thead><tr>'+cells(head).map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+cells(r).map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</tbody></table>';continue;}out+=lines[i]+'\n';i++;}
 out=out.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>').replace(/<br>\s*<table/g,'<table').replace(/<\/table>\s*<br>/g,'</table>').replace(/(?:<br>\s*)+$/,'');
 return out;}
function iaSetup(){if(document.getElementById('iaFab'))return;
 const css=document.createElement('style');css.textContent='.ia-fab{position:fixed;right:18px;bottom:18px;z-index:9998;display:flex;align-items:center;gap:8px;border:none;cursor:pointer;background:linear-gradient(135deg,#7c5cbf,#b67fc0);color:#fff;padding:12px 16px;border-radius:999px;box-shadow:0 6px 20px rgba(124,92,191,.4);font:600 15px/1 system-ui,-apple-system,sans-serif}.ia-fab:hover{filter:brightness(1.06)}.ia-overlay{position:fixed;inset:0;z-index:9999;background:rgba(40,30,50,.45);display:none;align-items:flex-end;justify-content:center}.ia-overlay.open{display:flex}.ia-modal{background:#fff;width:100%;max-width:560px;height:82vh;max-height:700px;border-radius:18px 18px 0 0;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -8px 40px rgba(0,0,0,.25)}@media(min-width:600px){.ia-overlay{align-items:center}.ia-modal{border-radius:18px;height:74vh}}.ia-head{display:flex;align-items:center;gap:10px;padding:13px 16px;background:linear-gradient(135deg,#efe7fb,#fdeef6);border-bottom:1px solid #eadff5}.ia-head h3{margin:0;font:700 16px system-ui,sans-serif;color:#4a3a5a}.ia-head .sub{display:block;font:400 12px system-ui,sans-serif;color:#8a7a9a;margin-top:2px}.ia-close{margin-left:auto;background:none;border:none;font-size:24px;cursor:pointer;color:#7a6a8a;line-height:1}.ia-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#faf7fd}.ia-msg{max-width:86%;padding:10px 13px;border-radius:14px;font:400 14.5px/1.55 system-ui,sans-serif;word-wrap:break-word;overflow-wrap:anywhere}.ia-msg.user{align-self:flex-end;background:#7c5cbf;color:#fff;border-bottom-right-radius:4px}.ia-msg.bot{align-self:flex-start;background:#fff;border:1px solid #ece3f5;color:#33283f;border-bottom-left-radius:4px}.ia-tbl{border-collapse:collapse;margin:6px 0;font-size:13px;width:100%}.ia-tbl th,.ia-tbl td{border:1px solid #ddd;padding:4px 8px;text-align:left}.ia-tbl th{background:#f3ecfb}.ia-msg code{background:#f0eaf8;padding:1px 5px;border-radius:5px;font-size:13px}.ia-foot{display:flex;gap:8px;padding:12px;border-top:1px solid #eee;background:#fff}.ia-foot input{flex:1;border:1.5px solid #d8cce8;border-radius:12px;padding:10px 12px;font:400 15px system-ui,sans-serif;outline:none}.ia-foot input:focus{border-color:#9b7fc7}.ia-foot button{border:none;background:#7c5cbf;color:#fff;border-radius:12px;padding:0 16px;font:600 15px system-ui,sans-serif;cursor:pointer}.ia-foot button:disabled{opacity:.5}.ia-note{font:400 11px system-ui,sans-serif;color:#9a8aaa;text-align:center;padding:0 12px 9px;background:#fff}';
 document.head.appendChild(css);
 const fab=document.createElement('button');fab.className='ia-fab';fab.id='iaFab';fab.type='button';fab.innerHTML='🤖 <span>Lya</span>';document.body.appendChild(fab);
 const ov=document.createElement('div');ov.className='ia-overlay';ov.id='iaOverlay';
 ov.innerHTML='<div class="ia-modal" role="dialog" aria-modal="true"><div class="ia-head"><span style="font-size:22px">🤖</span><div><h3 id="iaTitle"></h3><span class="sub" id="iaSub"></span></div><button class="ia-close" id="iaClose" aria-label="Fermer">×</button></div><div class="ia-msgs" id="iaMsgs"></div><div class="ia-foot"><input id="iaInput" autocomplete="off"><button id="iaSend" type="button"></button></div><div class="ia-note" id="iaNote"></div></div>';
 document.body.appendChild(ov);
 fab.onclick=iaOpen;
 document.getElementById('iaClose').onclick=iaClose;
 ov.onclick=e=>{if(e.target===ov)iaClose();};
 document.getElementById('iaSend').onclick=iaSend;
 document.getElementById('iaInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();iaSend();}});
}
function iaAddMsg(role,html){const m=document.getElementById('iaMsgs');const d=document.createElement('div');d.className='ia-msg '+role;d.innerHTML=html;m.appendChild(d);m.scrollTop=m.scrollHeight;return d;}
function iaOpen(){const es=lang==='es';const sec=iaCurrentSection();
 document.getElementById('iaTitle').textContent=es?'Lya — tutora de francés':'Lya — tutrice de français';
 document.getElementById('iaSub').textContent=es?'Solo gramática y conjugación':'Grammaire & conjugaison uniquement';
 document.getElementById('iaInput').placeholder=es?'Tu pregunta de gramática…':'Ta question de grammaire…';
 document.getElementById('iaSend').textContent=es?'Enviar':'Envoyer';
 document.getElementById('iaNote').textContent=es?'IA limitada a la gramática y conjugación del francés.':'IA limitée à la grammaire et la conjugaison du français.';
 document.getElementById('iaMsgs').innerHTML='';
 iaAddMsg('bot',iaEsc((es?'¡Hola! Soy Lya. Te ayudo con la gramática y la conjugación del francés (puedes escribirme en español). Estás en: « '+sec+' ». ¿Cuál es tu duda?':'Bonjour ! Je suis Lya. Je t\'aide avec la grammaire et la conjugaison du français (tu peux écrire en français ou en espagnol). Tu es dans : « '+sec+' ». Quelle est ta question ?')));
 document.getElementById('iaOverlay').classList.add('open');
 setTimeout(()=>document.getElementById('iaInput').focus(),50);
}
function iaClose(){document.getElementById('iaOverlay').classList.remove('open');}
async function iaSend(){const inp=document.getElementById('iaInput');const btn=document.getElementById('iaSend');const text=inp.value.trim();if(!text)return;const es=lang==='es';
 iaAddMsg('user',iaEsc(text));inp.value='';inp.disabled=true;btn.disabled=true;
 const typing=iaAddMsg('bot','<span style="opacity:.6">'+(es?'escribiendo…':'écrit…')+'</span>');
 try{const res=await fetch(IA_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,section:iaCurrentSection()})});
  if(!res.ok)throw new Error('http '+res.status);
  const data=await res.json();const reply=(data&&(data.reply||data.output||data.text))||(es?'(respuesta vacía)':'(réponse vide)');
  typing.innerHTML=iaMd(reply);}
 catch(e){typing.innerHTML='⚠️ '+(es?'Error de conexión. Intenta de nuevo.':'Erreur de connexion. Réessaie.');}
 finally{inp.disabled=false;btn.disabled=false;inp.focus();document.getElementById('iaMsgs').scrollTop=document.getElementById('iaMsgs').scrollHeight;}
}
iaSetup();

function render(){if(view.name==='home')renderHome();else if(view.name==='module')renderModule();else if(view.name==='exam')renderExam();else renderCategory();window.scrollTo(0,0);}
(async function(){if(typeof window.storage==='undefined'){const mem={};window.storage={get:async k=>mem[k]!==undefined?{value:mem[k]}:null,set:async (k,v)=>{mem[k]=v;return{value:v};}};}await loadState();render();})();
</script>
